<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | Brainrot Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    main {
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 24px;
      color: var(--text-main);
    }

    p {
      color: var(--text-main);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .contact-box {
      margin-top: 24px;
      background-color: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      width: fit-content;
    }

    .contact-box strong {
      color: var(--neon-green);
      display: block;
      margin-bottom: 8px;
    }

    .contact-email {
      font-size: 18px;
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all 0.2s;
    }

    .contact-email:hover {
      color: #fff;
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    .note {
      margin-top: 30px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* 🔍 現在探している情報セクションのスタイル */
    .info-seeking-box {
      margin-bottom: 32px;
    }

    .info-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 12px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-description {
      font-size: 15px;
      margin-bottom: 16px;
      color: var(--text-main);
      line-height: 1.5;
    }

    .info-highlight {
      color: var(--neon-cyan);
      font-weight: 600;
    }

    .info-list-container {
      padding: 0;
    }

    #seeking-list {
      font-size: 20px;
      font-weight: 700;
      list-style: none;
      padding: 0;
      margin: 0;
      color: #090909;
    }

    #seeking-list li {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #seeking-list li:last-child {
      margin-bottom: 0;
    }

    .list-arrow {
      color: var(--neon-green);
    }

    .info-footer {
      font-size: 14px;
      margin-top: 16px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <meta name="description" content="Brainrot合成マシン確率計算ツールは、モンスターの組み合わせによる確率や合計値を自動で計算できる非公式ツールです。">
  <!-- ✅ 共通ナビバー読み込み -->
  <div id="navbar"></div>
  <script>
    fetch("navbar.html")
      .then(res => res.text())
      .then(html => document.getElementById("navbar").innerHTML = html);
  </script>

  <main>
    <h2>情報提供</h2>
    <p>
      モンスターの情報提供や、このサイトに関するお問い合わせは、以下の連絡先までお願いします。
    </p>

    <div class="contact-box">
      <strong>📝 情報提供：</strong>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdfPuMi4qDWMzfp4wzQtUq3ne94Z0LJVE2Wc2WJQMpOTVSZ7A/viewform?usp=sf_link"
        target="_blank" rel="noopener noreferrer" class="contact-email">
        Googleフォームで送信する
      </a>

      <strong style="margin-top: 16px;">📧 メールアドレス（お問合せ）：</strong>
      <a href="mailto:matches-horsey7w@icloud.com" class="contact-email">
        matches-horsey7w@icloud.com
      </a>

      <strong style="margin-top: 16px;">𝕏 (旧Twitter)：</strong>
      <a href="https://x.com/abc_oxox" target="_blank" rel="noopener noreferrer" class="contact-email">
        @abc_oxox
      </a>
    </div>
    <br>

    <!-- 🔍 現在探している情報セクション -->
    <div class="info-seeking-box">
      <p class="info-title">📸 現在探している情報</p>
      <p class="info-description">
        以下のモンスターの情報を募集中です。スクショや画面直撮りで問題ありません。<br>
        <span class="info-highlight">※数値は「通常・変異なし」、図鑑画像は「通常」</span>の情報をお願いします。
      </p>

      <div class="info-list-container">
        <ul id="seeking-list">
          <!-- JSで動的に表示されます -->
        </ul>
      </div>

      <p class="info-footer">
        ※𝕏(Twitter)のDM、またはメール、お問い合わせフォームよりお送りください。
      </p>
    </div>

    <script>
      /**
       * 💡 メンテナンス用: 探している情報のリスト
       * ここに項目を追加・削除するだけで画面に反映されます。
       */
      const seekingItems = [
        "スイカ花の図鑑画像",
        "ピンククマの図鑑画像",
        "バギーの図鑑画像",
        "骨ドラゴンの図鑑画像",
        "ヘビの図鑑画像",
        "スケボーキュウリの図鑑画像",
        "カバキングの図鑑画像",
        "ムキムキの図鑑画像"

      ];

      function renderSeekingList() {
        const listEl = document.getElementById('seeking-list');
        if (!listEl) return;

        listEl.innerHTML = seekingItems.map(item => `
          <li>
            <span class="list-arrow">▶</span> ${item}
          </li>
        `).join('');
      }

      // 実行
      renderSeekingList();
    </script>
  </main>
</body>

</html>
